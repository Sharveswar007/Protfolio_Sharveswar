<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="accent5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g5)" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="320" x2="800" y2="320" />
    <line x1="0" y1="400" x2="800" y2="400" />
  </g>
  <!-- UI Window -->
  <rect x="40" y="40" width="720" height="420" rx="8" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.1" />
  <circle cx="60" cy="60" r="6" fill="#ff5f56" />
  <circle cx="76" cy="60" r="6" fill="#ffbd2e" />
  <circle cx="92" cy="60" r="6" fill="#27c93f" />
  <!-- Blog header -->
  <text x="130" y="65" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">Bloggify App</text>
  <!-- Blog content columns -->
  <!-- Left Side: Article list -->
  <rect x="60" y="100" width="420" height="330" rx="6" fill="url(#accent5)" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="80" y="130" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">Recent Articles</text>
  <!-- Article 1 -->
  <rect x="80" y="155" width="380" height="70" rx="4" fill="#141414" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="95" y="180" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Getting Started with Node.js and MongoDB</text>
  <rect x="95" y="195" width="280" height="6" rx="3" fill="#ffffff" opacity="0.2" />
  <rect x="95" y="208" width="160" height="6" rx="3" fill="#ffffff" opacity="0.1" />
  <!-- Article 2 -->
  <rect x="80" y="235" width="380" height="70" rx="4" fill="#141414" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="95" y="260" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Mastering REST API Best Practices</text>
  <rect x="95" y="275" width="240" height="6" rx="3" fill="#ffffff" opacity="0.2" />
  <rect x="95" y="288" width="190" height="6" rx="3" fill="#ffffff" opacity="0.1" />
  <!-- Right Side: Sidebar / Tags / Auth -->
  <rect x="500" y="100" width="240" height="330" rx="6" fill="url(#accent5)" stroke="#ffffff" stroke-opacity="0.05" />
  <!-- Login card mock -->
  <rect x="520" y="120" width="200" height="130" rx="6" fill="#141414" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="540" y="145" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.8">Author Login</text>
  <rect x="540" y="165" width="160" height="20" rx="10" fill="#000000" />
  <rect x="540" y="195" width="160" height="20" rx="10" fill="#000000" />
  <rect x="580" y="222" width="80" height="18" rx="9" fill="#ffffff" fill-opacity="0.8" />
  <!-- Tags -->
  <text x="520" y="285" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.8">Tags Cloud</text>
  <rect x="520" y="300" width="60" height="20" rx="10" fill="#292929" />
  <text x="550" y="314" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">Node</text>
  <rect x="590" y="300" width="70" height="20" rx="10" fill="#292929" />
  <text x="625" y="314" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">Express</text>
  <rect x="520" y="330" width="80" height="20" rx="10" fill="#292929" />
  <text x="560" y="344" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">MongoDB</text>
  <!-- Technical stack status -->
  <text x="400" y="455" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="10" opacity="0.4">ExpressJS • EJS Templates • MongoDB CRUD</text>
</svg>
