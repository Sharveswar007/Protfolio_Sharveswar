<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#292929" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g1)" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>
  <!-- Mockup UI Header -->
  <rect x="40" y="40" width="720" height="420" rx="8" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.1" />
  <circle cx="60" cy="60" r="6" fill="#ff5f56" />
  <circle cx="76" cy="60" r="6" fill="#ffbd2e" />
  <circle cx="92" cy="60" r="6" fill="#27c93f" />
  <!-- AI Chatbot interface lines -->
  <rect x="60" y="90" width="300" height="340" rx="6" fill="url(#accent)" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="80" y="120" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">CareerPath AI Bot</text>
  <rect x="80" y="145" width="200" height="30" rx="15" fill="#1f1f1f" />
  <circle cx="95" cy="160" r="8" fill="#ffffff" opacity="0.3" />
  <rect x="115" y="155" width="140" height="8" rx="4" fill="#ffffff" opacity="0.15" />
  <rect x="140" y="190" width="200" height="30" rx="15" fill="#292929" />
  <rect x="155" y="201" width="130" height="8" rx="4" fill="#ffffff" opacity="0.25" />
  <!-- Dashboard charts -->
  <rect x="380" y="90" width="360" height="160" rx="6" fill="url(#accent)" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="400" y="120" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">ATS Score &amp; Jobs</text>
  <circle cx="450" cy="180" r="40" fill="none" stroke="#292929" stroke-width="8" />
  <circle cx="450" cy="180" r="40" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="180 250" stroke-linecap="round" />
  <text x="450" y="185" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">92%</text>
  <rect x="520" y="150" width="180" height="8" rx="4" fill="#ffffff" opacity="0.2" />
  <rect x="520" y="170" width="140" height="8" rx="4" fill="#ffffff" opacity="0.1" />
  <rect x="520" y="190" width="160" height="8" rx="4" fill="#ffffff" opacity="0.15" />
  <!-- Code editor mockup -->
  <rect x="380" y="270" width="360" height="160" rx="6" fill="#000000" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="400" y="300" fill="#27c93f" font-family="monospace" font-size="12">// Executing Python Code...</text>
  <text x="400" y="325" fill="#ffffff" font-family="monospace" font-size="12" opacity="0.5">def analyze_market_trends(data):</text>
  <text x="400" y="345" fill="#ffffff" font-family="monospace" font-size="12" opacity="0.5">    return [t for t in data if t.ai]</text>
  <text x="400" y="375" fill="#ffbd2e" font-family="monospace" font-size="12">&gt; Success: FCP 1.2s</text>
</svg>
