<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g3)" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <circle cx="400" cy="250" r="100" fill="none" />
    <circle cx="400" cy="250" r="200" fill="none" />
    <circle cx="400" cy="250" r="300" fill="none" />
  </g>
  <!-- UI Window -->
  <rect x="40" y="40" width="720" height="420" rx="8" fill="#000000" stroke="#ffffff" stroke-opacity="0.1" />
  <circle cx="60" cy="60" r="6" fill="#ff5f56" />
  <circle cx="76" cy="60" r="6" fill="#ffbd2e" />
  <circle cx="92" cy="60" r="6" fill="#27c93f" />
  <!-- Lead Qualification Flow -->
  <!-- Left Side: Users coming in -->
  <rect x="80" y="120" width="180" height="60" rx="6" fill="#141414" stroke="#ffffff" stroke-opacity="0.1" />
  <text x="100" y="145" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.8">Incoming Visitors</text>
  <text x="100" y="165" fill="#ffffff" font-family="sans-serif" font-size="10" opacity="0.4">Via website &amp; landing pages</text>
  <!-- Arrow -->
  <line x1="260" y1="150" x2="310" y2="200" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" />
  <!-- Center: Chatbot -->
  <rect x="300" y="200" width="200" height="100" rx="10" fill="#1f1f1f" stroke="#ffffff" stroke-opacity="0.2" />
  <text x="400" y="235" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">SharpAlthon Bot</text>
  <text x="400" y="255" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" opacity="0.4">Groq AI Llama Model</text>
  <rect x="340" y="270" width="120" height="15" rx="7" fill="#292929" />
  <text x="400" y="281" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="9" font-weight="bold" opacity="0.7">Lead Qualified</text>
  <!-- Arrow -->
  <line x1="500" y1="250" x2="560" y2="300" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" />
  <!-- Right Side: Auto Email / CRM -->
  <rect x="540" y="300" width="180" height="60" rx="6" fill="#141414" stroke="#ffffff" stroke-opacity="0.1" />
  <text x="560" y="325" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.8">CRM Integration</text>
  <text x="560" y="345" fill="#ffffff" font-family="sans-serif" font-size="10" opacity="0.4">Email &amp; Slack alert triggered</text>
  <!-- Bottom Status -->
  <text x="400" y="430" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="12" opacity="0.6">&gt; 3rd Prize SharpAlthon (12h Hackathon)</text>
</svg>
