<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <!-- Center Star/Flower -->
  <g transform="translate(150, 130)">
    <!-- Orange loops -->
    <ellipse cx="0" cy="-25" rx="6" ry="28" fill="none" stroke="#c28522" stroke-width="3"/>
    <ellipse cx="0" cy="25" rx="6" ry="28" fill="none" stroke="#c28522" stroke-width="3"/>
    <ellipse cx="-25" cy="0" rx="28" ry="6" fill="none" stroke="#c28522" stroke-width="3"/>
    <ellipse cx="25" cy="0" rx="28" ry="6" fill="none" stroke="#c28522" stroke-width="3"/>
    
    <!-- Red loops (rotated 45deg) -->
    <g transform="rotate(45)">
      <ellipse cx="0" cy="-25" rx="6" ry="28" fill="none" stroke="#b0133c" stroke-width="3"/>
      <ellipse cx="0" cy="25" rx="6" ry="28" fill="none" stroke="#b0133c" stroke-width="3"/>
      <ellipse cx="-25" cy="0" rx="28" ry="6" fill="none" stroke="#b0133c" stroke-width="3"/>
      <ellipse cx="25" cy="0" rx="28" ry="6" fill="none" stroke="#b0133c" stroke-width="3"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#b0133c"/>
  </g>

  <!-- Left Orange Dashed Ring -->
  <path d="M 150 40 A 90 90 0 0 0 150 220" fill="none" stroke="#c28522" stroke-width="20" stroke-dasharray="10 8"/>

  <!-- Right Red Dashed Ring -->
  <path d="M 150 220 A 90 90 0 0 0 150 40" fill="none" stroke="#b0133c" stroke-width="20" stroke-dasharray="10 8"/>

  <!-- Text -->
  <text x="150" y="275" font-family="Georgia, Times New Roman, serif" font-size="52" fill="#b0133c" text-anchor="middle" letter-spacing="3">NPTEL</text>
</svg>
